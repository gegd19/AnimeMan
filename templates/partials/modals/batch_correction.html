<div id="batchCorrectionModal" class="modal">
    <div class="modal-content" style="max-width: 1000px;">
        <div class="modal-header">
            <h3>📦 批量手动修正</h3>
            <span onclick="App.BatchCorrection.closeModal()" style="cursor:pointer;font-size:28px;line-height:1;">&times;</span>
        </div>
        <div class="modal-body">
            <div><strong>已选择文件夹：</strong> <span id="batchFolderPath"></span></div>
            <div style="margin-top: 15px;">
                <strong>文件列表（共 <span id="batchFileCount">0</span> 个，勾选即处理）：</strong>
                <div id="batchFileList" style="max-height: 300px; overflow-y: auto; border: 1px solid #dee2e6; border-radius: 8px; padding: 10px; margin-top: 8px; background: #fff;"></div>
            </div>
            <div class="field-row" style="margin-top: 15px;">
                <label>TMDB 搜索</label>
                <div style="display:flex; gap:8px; flex:1;">
                    <input type="text" id="batchTmdbSearchInput" placeholder="输入标题搜索" style="flex:1;">
                    <select id="batchTmdbSearchType"><option value="tv">剧集</option><option value="movie">电影</option></select>
                    <button type="button" onclick="App.BatchCorrection.searchTmdb()">搜索</button>
                </div>
            </div>
            <div id="batchTmdbResults" style="max-height: 200px; overflow-y: auto; margin-top: 10px; border:1px solid #dee2e6; border-radius:8px;"></div>
            <div id="batchSelectedTmdbInfo" style="margin-top:15px; padding:10px; background:#e7f1ff; border-radius:8px; display:none;">
                <strong>已选择：</strong> <span id="batchSelectedTmdbTitle"></span> (ID: <span id="batchSelectedTmdbId"></span>)
            </div>
            <div class="field-row"><label>季号</label><input type="number" id="batchSeason" min="0" value="1" style="width:100px;"></div>
            <div class="field-row"><label>起始集号</label><input type="number" id="batchStartEpisode" min="1" value="1" style="width:100px;"></div>
            <div class="field-row"><label>集号增量</label><input type="number" id="batchEpisodeIncrement" min="1" value="1" style="width:100px;"></div>
            <!-- 新增：自动跨季换算选项 -->
            <div class="field-row">
                <label>自动跨季换算</label>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="batchAutoSeasonCheck">
                    <span style="color: #6c757d;">将起始集号视为绝对集数，自动计算正确季/集（排除特典季 S0）</span>
                </div>
            </div>
            <div class="note">💡 系统将按列表顺序依次处理勾选的文件，集号自动递增。若启用自动跨季换算，则根据 TMDB 季结构计算实际季/集。</div>
            <div style="margin-top:20px; display:flex; gap:10px;">
                <button type="button" onclick="App.BatchCorrection.execute()" class="success">✅ 开始批量修正</button>
                <button type="button" onclick="App.BatchCorrection.closeModal()" class="secondary">取消</button>
            </div>
        </div>
    </div>
</div>
